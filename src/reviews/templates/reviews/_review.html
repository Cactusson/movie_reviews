<div class="review">
    <h2>{% if link_needed %}<a href="{{ review.get_absolute_url }}">{{ review.title }}</a>{% else %}{{ review.title }}{% endif %}</h2>
    <div class="author"><strong>Author: </strong> <a href="{{ review.author.get_absolute_url }}">{{ review.author.name }}</a></div>
    <div class="url"><strong>URL: </strong> <a href="{{ review.url }}"><span class="small">{{ review.url }}</span></a></div>
    <div class="date"><strong>Date: </strong> {{ review.formatted_date }}</div>
</div>
